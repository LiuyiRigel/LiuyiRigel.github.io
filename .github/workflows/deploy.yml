name: Deploy Academic Pages

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 确保获取完整历史记录，有利于某些 Jekyll 插件计算时间

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # 核心修复：升级 Ruby 以满足 nokogiri 1.16+ 的要求
          bundler-cache: true # 自动运行 bundle install 并缓存依赖，加快后续构建速度

      - name: Build and Deploy
        uses: helaili/jekyll-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target_branch: 'gh-pages' # 网站静态文件将发布到此分支
          # 如果你的 Gemfile 中有特殊依赖，该 Action 会自动处理